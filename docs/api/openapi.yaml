openapi: 3.0.0
info:
  title: Apex UEEP API
  description: Universal Enterprise AI Operating System API. Monetize data, orchestrate AI agents, and manage billing.
  version: 1.0.0
  contact:
    email: gwc2780@gmail.com
servers:
  - url: https://apex-api.railway.app
    description: Production Server
  - url: http://localhost:8000
    description: Local Development
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: []
paths:
  /api/v1/health:
    get:
      summary: Health Check
      description: Returns the status of the API and its dependencies
      responses:
        '200':
          description: API is healthy
  /api/v1/nwu/ingest:
    post:
      summary: Ingest Data for Monetization
      description: Ingest enterprise data to issue Liquidity Bonds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                asset_id:
                  type: string
                data_type:
                  type: string
                volume_gb:
                  type: number
      responses:
        '201':
          description: Data ingested successfully
  /api/v1/agents/orchestrate:
    post:
      summary: Dispatch AI Agent Task
      description: Sends a prompt to the GENESIS multi-agent topology.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task_id:
                  type: string
                agent_type:
                  type: string
                prompt:
                  type: string
      responses:
        '200':
          description: Task queued successfully

  # ── Edge Node Endpoints ─────────────────────────────────────
  /edge/heartbeat:
    get:
      summary: Edge Node Heartbeat
      description: Returns node identity and uptime. Used by health gates to verify liveness.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Node is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_id:
                    type: string
                    example: "pixel-10-edge-001"
                  uptime_s:
                    type: integer
                  status:
                    type: string
                    enum: [active, inactive]
  /edge/auth/verify:
    post:
      summary: Verify Edge Node Token
      description: Validates the bearer token presented by an edge node.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  node_id:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
  /edge/resources:
    get:
      summary: Edge Node Resource Status
      description: Reports current CPU, RAM, and battery levels from the edge device.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Resource snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_id:
                    type: string
                  cpu_pct:
                    type: number
                  ram_available_mb:
                    type: integer
                  battery_pct:
                    type: integer
  /edge/tasks/assign:
    post:
      summary: Assign Task to Edge Node
      description: Push a revenue or outreach task to the edge node for execution.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task_id:
                  type: string
                task_type:
                  type: string
                  enum: [revenue_collect, lead_score, outreach_email, health_probe]
                payload:
                  type: object
      responses:
        '202':
          description: Task accepted and queued
        '429':
          description: Node task queue is full
  /webhook/edge/node-status:
    post:
      summary: Edge Node Status Webhook
      description: Receives activation/deactivation events from edge nodes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                node_id:
                  type: string
                status:
                  type: string
                  enum: [active, inactive]
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Status received
  /webhook/edge/revenue:
    post:
      summary: Edge Revenue Event Webhook
      description: Receives revenue collection events from edge nodes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                node_id:
                  type: string
                charge_id:
                  type: string
                amount_usd:
                  type: string
                plan:
                  type: string
                source:
                  type: string
                  example: "edge"
      responses:
        '200':
          description: Revenue event recorded
