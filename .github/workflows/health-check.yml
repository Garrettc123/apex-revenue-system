name: Scheduled Health Check

on:
  schedule:
    - cron: '0 9,15,21 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway API health
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://apex-revenue-system.up.railway.app' }}
        run: |
          echo "Health check at $(date -u)"
          curl -sf "$BASE_URL/health" && echo "✅ API healthy" || echo "❌ API down — check Railway dashboard"

      - name: Log status
        run: echo "System check complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
