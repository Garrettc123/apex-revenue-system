name: Master Enterprise Wealth Machine

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'          # every hour (health + Genesis)
    - cron: '0 9 * * 1-5'        # 09:00 UTC weekdays (outreach)
  workflow_dispatch: {}

jobs:
  # ------------------------------
  # 1. Deploy frontend (push only)
  # ------------------------------
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger deploy workflow (Vercel + backend)
        uses: peter-evans/workflow-dispatch@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: deploy.yml
          ref: main

  # ------------------------------
  # 2. Genesis self‑heal (hourly)
  # ------------------------------
  genesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Genesis self‑heal workflow
        uses: peter-evans/workflow-dispatch@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: "Genesis self heal.yml"
          ref: main

  # ------------------------------
  # 3. Health checks (hourly)
  # ------------------------------
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stripe connector health check
        uses: peter-evans/workflow-dispatch@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: stripe-connector.yml
          ref: main
      - name: Database backup (if schedule matches nightly)
        if: github.event.schedule == '0 0 * * *'
        uses: peter-evans/workflow-dispatch@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: database-backup.yml
          ref: main

  # ------------------------------
  # 4. Outreach (weekday 09:00)
  # ------------------------------
  outreach:
    if: github.event.schedule == '0 9 * * 1-5'
    runs-on: ubuntu-latest
    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pull 100 leads from Apollo
        run: |
          python3 scripts/pull_leads_apollo.py \
            --count 100 \
            --filters "title:CTO|VP Engineering company_size:50-5000 industry:SaaS|Fintech"
      - name: Score leads (min 70)
        run: python3 scripts/score_leads_ai.py --min_score 70
      - name: Send Wave 1 via SendGrid
        run: |
          python3 scripts/send_wave1_sendgrid.py \
            --template welcome_sequence_1 \
            --segment "score>=70"
