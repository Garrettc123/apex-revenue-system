name: Build & Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force Railway redeploy'
        required: false
        default: 'true'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate app
        run: |
          python -c "
import main
import revenue_aggregator
import ai_agent_hub
print('✅ All modules import successfully')
"

      - name: Test API endpoints (local)
        run: |
          python main.py &
          sleep 3
          curl -sf http://localhost:5000/health | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy'; print('✅ /health OK')"
          curl -sf http://localhost:5000/metrics | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='operational'; print('✅ /metrics OK')"
          kill %1 2>/dev/null || true

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️  RAILWAY_TOKEN secret not set — skipping deploy"
            echo "Add it at: https://github.com/Garrettc123/apex-revenue-system/settings/secrets/actions"
            exit 0
          fi
          railway up --detach
          echo "✅ Deployed to Railway"

      - name: Deployment summary
        if: always()
        run: |
          echo "======================================"
          echo "  APEX REVENUE SYSTEM — DEPLOY DONE"
          echo "  Repo:    https://github.com/Garrettc123/apex-revenue-system"
          echo "  Railway: https://railway.app/dashboard"
          echo "  Time:    $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "======================================"
