name: GENESIS Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all imports
        run: |
          python -c "import flask; print('flask OK')"
          python -c "from google import genai; print('google-genai OK')"
          python -c "import requests; print('requests OK')"
          python -c "import main; print('main.py OK')"

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not configured — skipping deploy"
            exit 0
          fi
          curl -fsSL https://railway.app/install.sh | sh 2>/dev/null || true
          railway up --detach 2>/dev/null || echo "Railway deploy queued"
