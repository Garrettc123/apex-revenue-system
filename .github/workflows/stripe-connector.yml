name: Stripe Connector
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  stripe-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stripe Health Check
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ]; then
            echo "STRIPE_SECRET_KEY not configured — skipping Stripe health check"
            exit 0
          fi
          echo "Stripe connector running at $(date)"
          curl -sf https://api.stripe.com/v1/balance \
            -u "$STRIPE_SECRET_KEY:" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Stripe connected. Available:', d.get('available', 'N/A'))" \
            || echo "Stripe ping failed - check key"
