name: Enterprise Wealth Machine

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1-5'   # 9am UTC weekdays: lead pull + Wave 1
  workflow_dispatch: {}

jobs:

  # -------------------------------------------------------
  # 1. GENESIS SELF-HEAL (on push + manual only)
  # -------------------------------------------------------
  genesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv 2>/dev/null || true

      - name: Genesis self-heal check
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, requests, datetime

          print(f"[GENESIS] Run at {datetime.datetime.utcnow().isoformat()}Z")

          stripe_key = os.getenv("STRIPE_SECRET_KEY", "")
          if stripe_key:
              try:
                  r = requests.get(
                      "https://api.stripe.com/v1/balance",
                      headers={"Authorization": f"Bearer {stripe_key}"},
                      timeout=10
                  )
                  bal = r.json().get("available", [{}])
                  usd = next((b["amount"]/100 for b in bal if b.get("currency")=="usd"), 0)
                  print(f"[STRIPE] Balance: ${usd:.2f} | Status: {r.status_code}")
              except Exception as e:
                  print(f"[STRIPE] Error: {e}")
          else:
              print("[STRIPE] No key — skipping")

          sg_key = os.getenv("SENDGRID_API_KEY", "")
          if not sg_key:
              print("[SENDGRID] No key configured — skipping")
          else:
              print("[SENDGRID] Key configured")

          print("[GENESIS] Complete")
          EOF

  # -------------------------------------------------------
  # 2. HEALTH CHECK (on push + manual only)
  # -------------------------------------------------------
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System health check
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          echo "[HEALTH] Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          [ -n "$STRIPE_SECRET_KEY" ] && echo "[HEALTH] Stripe: configured" || echo "[HEALTH] WARNING: STRIPE_SECRET_KEY missing"
          [ -n "$DB_HOST" ] && echo "[HEALTH] DB: configured" || echo "[HEALTH] WARNING: DB_HOST missing"
          echo "[HEALTH] Done"

  # -------------------------------------------------------
  # 3. OUTREACH (weekday 09:00 UTC)
  # -------------------------------------------------------
  outreach:
    if: github.event.schedule == '0 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check required secrets
        run: |
          if [ -z "$APOLLO_API_KEY" ] && [ -z "$SENDGRID_API_KEY" ]; then
            echo "Neither APOLLO_API_KEY nor SENDGRID_API_KEY configured — skipping outreach"
            exit 0
          fi

      - name: Install deps
        run: pip install -r requirements.txt 2>/dev/null || pip install requests python-dotenv

      - name: Pull leads from Apollo
        run: |
          if [ -z "$APOLLO_API_KEY" ]; then
            echo "[OUTREACH] APOLLO_API_KEY not configured — skipping lead pull"
            exit 0
          fi
          if [ -f scripts/pull_leads_apollo.py ]; then
            python3 scripts/pull_leads_apollo.py \
              --count 100 \
              --filters "title:CTO|VP Engineering company_size:50-5000 industry:SaaS|Fintech"
          else
            echo "[OUTREACH] pull_leads_apollo.py not found — skipping"
          fi

      - name: Score leads (>=70)
        run: |
          if [ -f scripts/score_leads_ai.py ]; then
            python3 scripts/score_leads_ai.py --min_score 70
          else
            echo "[OUTREACH] score_leads_ai.py not found — skipping"
          fi

      - name: Send Wave 1 via SendGrid
        run: |
          if [ -z "$SENDGRID_API_KEY" ]; then
            echo "[OUTREACH] SENDGRID_API_KEY not configured — skipping send"
            exit 0
          fi
          if [ -f scripts/send_wave1_sendgrid.py ]; then
            python3 scripts/send_wave1_sendgrid.py \
              --template welcome_sequence_1 \
              --segment "score>=70"
          else
            echo "[OUTREACH] send_wave1_sendgrid.py not found — skipping"
          fi
