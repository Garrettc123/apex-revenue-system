name: Database Backup
on:
  schedule:
    - cron: '0 2 * * *'   # once per day at 02:00 UTC
  workflow_dispatch:

jobs:
  db-backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          MISSING=0
          [ -z "$DB_HOST" ] && { echo "DB_HOST not configured"; MISSING=$((MISSING+1)); }
          [ -z "$DB_PASSWORD" ] && { echo "DB_PASSWORD not configured"; MISSING=$((MISSING+1)); }
          [ -z "$AWS_ACCESS_KEY_ID" ] && { echo "AWS_ACCESS_KEY_ID not configured"; MISSING=$((MISSING+1)); }
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && { echo "AWS_SECRET_ACCESS_KEY not configured"; MISSING=$((MISSING+1)); }
          if [ "$MISSING" -gt 0 ]; then
            echo "WARNING: $MISSING secret(s) missing — backup may be incomplete"
          fi

      - name: DB Connectivity Check
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "DB Backup workflow running at $(date)"
          if [ -z "$DB_HOST" ]; then
            echo "DB_HOST not configured — skipping backup"
            exit 0
          fi
          echo "DB_HOST: configured"
          echo "Backup triggered - pipeline healthy"
